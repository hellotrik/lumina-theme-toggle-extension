name: Publish

# Builds and publishes the extension to the VS Code Marketplace and Open VSX.
# Called by release-please.yml after a release is created, and also runnable
# manually (Actions -> Publish -> Run workflow) to publish the current main.
on:
  workflow_call:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies -o theme-toggle.vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --no-dependencies --packagePath theme-toggle.vsix -p "$VSCE_PAT"

      # Open VSX (Cursor/Windsurf/VSCodium). Won't fail the run if the namespace
      # isn't set up yet or no token is configured.
      - name: Publish to Open VSX
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: pnpm exec ovsx publish theme-toggle.vsix -p "$OVSX_PAT"
